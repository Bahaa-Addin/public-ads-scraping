# Bitbucket Pipelines Configuration for Creative Ads Platform
#
# This pipeline handles:
# - Building and testing Python and Node.js components
# - Docker image building and pushing to Artifact Registry
# - Terraform infrastructure deployment
# - Cloud Run service deployment

image: google/cloud-sdk:latest

definitions:
  caches:
    pip: ~/.cache/pip
    npm: ~/.npm
    playwright: ~/.cache/ms-playwright

  services:
    docker:
      memory: 4096

  steps:
    # =========================================================================
    # Python Testing
    # =========================================================================
    - step: &python-test
        name: Test Python Components
        image: python:3.11-slim
        caches:
          - pip
        script:
          - pip install --upgrade pip
          # Install agent dependencies
          - pip install -r agent/requirements.txt
          - pip install -r feature_extraction/requirements.txt
          - pip install -r reverse_prompt/requirements.txt
          - pip install -r firestore/requirements.txt
          # Install test dependencies
          - pip install pytest pytest-asyncio pytest-cov mypy
          # Run linting
          - pip install flake8 black isort
          - black --check agent/ feature_extraction/ reverse_prompt/ firestore/
          - flake8 agent/ feature_extraction/ reverse_prompt/ firestore/ --max-line-length=100
          # Run type checking
          - mypy agent/ --ignore-missing-imports || true
          # Run tests
          - pytest tests/ -v --cov=agent --cov=feature_extraction --cov=reverse_prompt --cov-report=xml
        artifacts:
          - coverage.xml

    # =========================================================================
    # Node.js Testing
    # =========================================================================
    - step: &nodejs-test
        name: Test Node.js Scrapers
        image: node:20-slim
        caches:
          - npm
        script:
          - cd scrapers
          - npm ci
          # Run linting
          - npm run lint || true
          # Run tests
          - npm test || true
        artifacts:
          - scrapers/coverage/**

    # =========================================================================
    # Build Docker Images
    # =========================================================================
    - step: &build-agent
        name: Build Agent Docker Image
        services:
          - docker
        caches:
          - docker
        script:
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - export REGISTRY=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/creative-ads
          # Authenticate to Artifact Registry
          - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
          - gcloud auth activate-service-account --key-file=/tmp/key.json
          - gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
          # Build and push
          - docker build -t ${REGISTRY}/agent:${IMAGE_TAG} -t ${REGISTRY}/agent:latest -f docker/Dockerfile.agent .
          - docker push ${REGISTRY}/agent:${IMAGE_TAG}
          - docker push ${REGISTRY}/agent:latest
        artifacts:
          - docker-image-agent.txt

    - step: &build-scraper
        name: Build Scraper Docker Image
        services:
          - docker
        caches:
          - docker
        script:
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - export REGISTRY=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/creative-ads
          # Authenticate to Artifact Registry
          - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
          - gcloud auth activate-service-account --key-file=/tmp/key.json
          - gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
          # Build and push
          - docker build -t ${REGISTRY}/scraper:${IMAGE_TAG} -t ${REGISTRY}/scraper:latest -f docker/Dockerfile.scraper .
          - docker push ${REGISTRY}/scraper:${IMAGE_TAG}
          - docker push ${REGISTRY}/scraper:latest

    # =========================================================================
    # Terraform Plan
    # =========================================================================
    - step: &terraform-plan
        name: Terraform Plan
        image: hashicorp/terraform:1.6
        script:
          - cd terraform
          # Authenticate
          - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
          - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json
          # Initialize
          - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=creative-ads-${BITBUCKET_DEPLOYMENT_ENVIRONMENT}"
          # Plan
          - terraform plan -var="project_id=${GCP_PROJECT_ID}" -var="region=${GCP_REGION}" -var="environment=${BITBUCKET_DEPLOYMENT_ENVIRONMENT}" -out=tfplan
        artifacts:
          - terraform/tfplan
          - terraform/.terraform/**

    # =========================================================================
    # Terraform Apply
    # =========================================================================
    - step: &terraform-apply
        name: Terraform Apply
        image: hashicorp/terraform:1.6
        script:
          - cd terraform
          # Authenticate
          - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
          - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json
          # Initialize
          - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=creative-ads-${BITBUCKET_DEPLOYMENT_ENVIRONMENT}"
          # Apply
          - terraform apply -auto-approve -var="project_id=${GCP_PROJECT_ID}" -var="region=${GCP_REGION}" -var="environment=${BITBUCKET_DEPLOYMENT_ENVIRONMENT}"
          # Output configuration
          - terraform output -json > ../terraform-outputs.json
        artifacts:
          - terraform-outputs.json

    # =========================================================================
    # Deploy to Cloud Run
    # =========================================================================
    - step: &deploy-cloud-run
        name: Deploy to Cloud Run
        script:
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - export REGISTRY=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/creative-ads
          # Authenticate
          - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
          - gcloud auth activate-service-account --key-file=/tmp/key.json
          - gcloud config set project ${GCP_PROJECT_ID}
          # Deploy Agent
          - |
            gcloud run deploy creative-ads-agent \
              --image=${REGISTRY}/agent:${IMAGE_TAG} \
              --region=${GCP_REGION} \
              --platform=managed \
              --allow-unauthenticated=false \
              --service-account=creative-ads-sa@${GCP_PROJECT_ID}.iam.gserviceaccount.com \
              --set-env-vars="GCP_PROJECT_ID=${GCP_PROJECT_ID},ENVIRONMENT=${BITBUCKET_DEPLOYMENT_ENVIRONMENT}"
          # Deploy Scraper
          - |
            gcloud run deploy creative-ads-scraper \
              --image=${REGISTRY}/scraper:${IMAGE_TAG} \
              --region=${GCP_REGION} \
              --platform=managed \
              --memory=2Gi \
              --cpu=2 \
              --timeout=600 \
              --service-account=creative-ads-sa@${GCP_PROJECT_ID}.iam.gserviceaccount.com \
              --set-env-vars="GCP_PROJECT_ID=${GCP_PROJECT_ID},HEADLESS=true"

    # =========================================================================
    # Notify on Failure
    # =========================================================================
    - step: &notify-failure
        name: Notify on Failure
        script:
          - |
            if [ -n "${SLACK_WEBHOOK_URL}" ]; then
              curl -X POST -H 'Content-type: application/json' \
                --data "{\"text\":\"❌ Pipeline failed for ${BITBUCKET_REPO_SLUG} on branch ${BITBUCKET_BRANCH}\"}" \
                ${SLACK_WEBHOOK_URL}
            fi
        trigger: manual
        after-script:
          - exit 0

# =============================================================================
# Pipeline Definitions
# =============================================================================

pipelines:
  # Default pipeline for all branches
  default:
    - parallel:
        - step: *python-test
        - step: *nodejs-test

  # Pull request validation
  pull-requests:
    '**':
      - parallel:
          - step: *python-test
          - step: *nodejs-test
      - step: *terraform-plan

  # Branch-specific pipelines
  branches:
    # Development branch
    develop:
      - parallel:
          - step: *python-test
          - step: *nodejs-test
      - parallel:
          - step: *build-agent
          - step: *build-scraper
      - step:
          <<: *terraform-plan
          deployment: development
      - step:
          <<: *terraform-apply
          deployment: development
          trigger: manual
      - step:
          <<: *deploy-cloud-run
          deployment: development

    # Staging branch
    staging:
      - parallel:
          - step: *python-test
          - step: *nodejs-test
      - parallel:
          - step: *build-agent
          - step: *build-scraper
      - step:
          <<: *terraform-plan
          deployment: staging
      - step:
          <<: *terraform-apply
          deployment: staging
          trigger: manual
      - step:
          <<: *deploy-cloud-run
          deployment: staging

    # Production branch
    main:
      - parallel:
          - step: *python-test
          - step: *nodejs-test
      - parallel:
          - step: *build-agent
          - step: *build-scraper
      - step:
          <<: *terraform-plan
          deployment: production
      - step:
          <<: *terraform-apply
          deployment: production
          trigger: manual
      - step:
          <<: *deploy-cloud-run
          deployment: production
          trigger: manual

  # Custom pipelines
  custom:
    # Manual full deployment
    full-deploy:
      - variables:
          - name: ENVIRONMENT
            default: development
            allowed-values:
              - development
              - staging
              - production
      - parallel:
          - step: *python-test
          - step: *nodejs-test
      - parallel:
          - step: *build-agent
          - step: *build-scraper
      - step:
          <<: *terraform-apply
          deployment: $ENVIRONMENT
      - step:
          <<: *deploy-cloud-run
          deployment: $ENVIRONMENT

    # Infrastructure only
    infra-only:
      - variables:
          - name: ENVIRONMENT
            default: development
      - step:
          <<: *terraform-plan
          deployment: $ENVIRONMENT
      - step:
          <<: *terraform-apply
          deployment: $ENVIRONMENT
          trigger: manual

    # Destroy infrastructure (careful!)
    infra-destroy:
      - variables:
          - name: ENVIRONMENT
            allowed-values:
              - development
              - staging
      - step:
          name: Terraform Destroy
          image: hashicorp/terraform:1.6
          deployment: $ENVIRONMENT
          trigger: manual
          script:
            - cd terraform
            - echo ${GCP_SERVICE_KEY} | base64 -d > /tmp/key.json
            - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/key.json
            - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=creative-ads-${ENVIRONMENT}"
            - terraform destroy -auto-approve -var="project_id=${GCP_PROJECT_ID}" -var="region=${GCP_REGION}" -var="environment=${ENVIRONMENT}"

