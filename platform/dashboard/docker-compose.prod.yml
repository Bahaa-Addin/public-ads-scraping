# =============================================================================
# Agentic Ads Dashboard - Docker Compose Production
# =============================================================================
# Production-ready configuration

version: '3.8'

services:
  # Dashboard API Backend
  api:
    image: ${REGISTRY_URL}/dashboard-api:${IMAGE_TAG:-latest}
    ports:
      - '8000:8000'
    environment:
      - ENVIRONMENT=production
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - FIRESTORE_COLLECTION_PREFIX=${FIRESTORE_COLLECTION_PREFIX:-creative_ads}
      - PUBSUB_TOPIC=${PUBSUB_TOPIC:-agentic-ads-jobs}
      - PUBSUB_SUBSCRIPTION=${PUBSUB_SUBSCRIPTION:-agentic-ads-jobs-sub}
      - AGENT_API_URL=${AGENT_API_URL}
      - SCRAPER_API_URL=${SCRAPER_API_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ENABLE_METRICS=true
      - ENABLE_CLOUD_LOGGING=true
    restart: unless-stopped
    networks:
      - dashboard-network
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Dashboard Frontend
  frontend:
    image: ${REGISTRY_URL}/dashboard-frontend:${IMAGE_TAG:-latest}
    ports:
      - '80:80'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - dashboard-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  dashboard-network:
    driver: bridge
